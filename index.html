<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Heads Up Hold'em — 3D Table</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a12;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #e8d5a3;
    }
    #canvas-container {
      position: fixed; inset: 0;
    }
    #canvas-container canvas {
      display: block; width: 100% !important; height: 100% !important;
    }
    /* HUD overlay */
    #hud {
      position: fixed; inset: 0; pointer-events: none;
      display: flex; flex-direction: column;
    }
    /* Top bar */
    #top-bar {
      pointer-events: auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px;
      background: linear-gradient(to bottom, rgba(10,10,20,0.85), transparent);
    }
    #top-bar h1 {
      font-size: 1.1rem; font-weight: 700;
      text-shadow: 0 0 8px rgba(200,170,80,0.8);
      color: #e8d5a3; letter-spacing: 1px;
    }
    #stack-display {
      font-size: 1.1rem; font-weight: 700;
      color: #f0d060; text-shadow: 0 0 6px rgba(240,210,80,0.6);
    }
    /* Bottom bar */
    #bottom-bar {
      pointer-events: auto;
      margin-top: auto;
      padding: 10px 16px 16px;
      background: linear-gradient(to top, rgba(10,10,20,0.92), transparent);
      display: flex; align-items: flex-end; justify-content: space-between; gap: 8px;
    }
    .btn-group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .btn {
      padding: 7px 13px; border: none; border-radius: 6px; cursor: pointer;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.5px;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn:active { transform: scale(0.95); }
    .btn-green  { background: #2a6e3a; color: #d0ffd8; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
    .btn-green:hover  { background: #348048; }
    .btn-red    { background: #7a1f1f; color: #ffd8d8; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
    .btn-red:hover    { background: #8e2525; }
    .btn-blue   { background: #1a3a6e; color: #d0e8ff; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
    .btn-blue:hover   { background: #254a8a; }
    .btn-gold   { background: #7a5c10; color: #fff0b0; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
    .btn-gold:hover   { background: #956e14; }
    /* Toggle */
    .toggle-wrap { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; }
    .toggle-wrap label { cursor: pointer; color: #b8a880; }
    .toggle {
      appearance: none; -webkit-appearance: none;
      width: 36px; height: 18px; background: #333; border-radius: 9px;
      position: relative; cursor: pointer; transition: background 0.2s;
    }
    .toggle:checked { background: #2a8050; }
    .toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%; background: #eee;
      transition: left 0.2s;
    }
    .toggle:checked::after { left: 20px; }
    /* Chip denomination buttons */
    .denom-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3);
      cursor: pointer; font-size: 0.6rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, border-color 0.1s;
    }
    .denom-btn:hover  { transform: scale(1.1); border-color: #e8d5a3; }
    .denom-btn.active { border-color: #f0d060; box-shadow: 0 0 8px #f0d060; }
    /* Tooltip */
    #tooltip {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%);
      background: rgba(10,10,20,0.82); color: #ccc;
      font-size: 0.72rem; padding: 4px 10px; border-radius: 4px;
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    #tooltip.show { opacity: 1; }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="hud">
  <!-- Top bar -->
  <div id="top-bar">
    <div>
      <span style="font-size:0.75rem;color:#888;">STACK</span><br>
      <span id="stack-display">$1,000</span>
    </div>
    <h1>Heads Up Hold'em</h1>
    <div style="text-align:right;">
      <span id="chip-count-display" style="font-size:0.75rem;color:#888;">0 chips</span>
    </div>
  </div>

  <!-- Spacer -->
  <div style="flex:1;"></div>

  <!-- Bottom bar -->
  <div id="bottom-bar">
    <!-- Denomination selector -->
    <div id="denom-group" class="btn-group"></div>

    <!-- Buy-in and actions -->
    <div class="btn-group">
      <button id="btn-buyin" class="btn btn-green">Buy In</button>
      <button id="btn-reset" class="btn btn-red">Reset Table</button>
    </div>

    <!-- Stack Assist toggle -->
    <div class="toggle-wrap">
      <input type="checkbox" class="toggle" id="toggle-assist" checked>
      <label for="toggle-assist">Stack Assist</label>
    </div>
  </div>
</div>

<div id="tooltip">Drag chips to move · Drop onto a stack to stack</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
